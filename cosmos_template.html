<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos - 文本知识星球</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#000010; font-family:'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif; }

#graph-container { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:1; }
#starfield { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
#loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:100; color:rgba(255,255,255,0.7); font-size:16px; letter-spacing:4px; transition:opacity 0.5s; pointer-events:none; }

#title-bar {
  position:fixed; top:22px; left:50%; transform:translateX(-50%);
  z-index:10; pointer-events:none;
  color:rgba(255,255,255,0.85); font-size:20px; font-weight:300;
  letter-spacing:8px; text-shadow:0 0 30px rgba(100,160,255,0.5);
}

#legend {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  z-index:10; display:flex; gap:14px; flex-wrap:wrap; justify-content:center;
  background:rgba(10,12,30,0.75); border:1px solid rgba(255,255,255,0.1);
  border-radius:12px; padding:10px 18px; backdrop-filter:blur(10px);
}
.legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:rgba(255,255,255,0.75); }
.legend-dot { width:9px; height:9px; border-radius:50%; box-shadow:0 0 6px currentColor; }

#sidebar {
  position:fixed; top:0; right:-420px; width:400px; height:100vh;
  background:rgba(10,12,32,0.93); backdrop-filter:blur(14px);
  border-left:1px solid rgba(255,255,255,0.1);
  z-index:20; transition:right 0.35s cubic-bezier(0.4,0,0.2,1);
  display:flex; flex-direction:column; color:#c8d4e8;
  box-shadow:-4px 0 40px rgba(0,0,0,0.5);
}
#sidebar.open { right:0; }
#sidebar-header {
  padding:18px 20px 14px; border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex; justify-content:space-between; align-items:center;
}
#sidebar-header h2 { font-size:16px; font-weight:500; color:#fff; margin:0; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#sidebar-close {
  background:none; border:1px solid rgba(255,255,255,0.15); color:#999;
  font-size:16px; cursor:pointer; width:30px; height:30px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0;
}
#sidebar-close:hover { color:#fff; border-color:rgba(255,255,255,0.5); }
#sidebar-content { flex:1; overflow-y:auto; padding:16px 20px 30px; }

.info-row { margin-bottom:12px; }
.info-label { font-size:10px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:3px; }
.info-value { font-size:15px; color:#e4eaf4; word-break:break-word; }
.info-badge { display:inline-block; padding:3px 12px; border-radius:12px; font-size:12px; color:#fff; font-weight:500; }

.attr-row { display:flex; padding:3px 0; font-size:12px; }
.attr-key { color:rgba(255,255,255,0.45); min-width:55px; flex-shrink:0; }
.attr-val { color:#bcc8de; }

#evidence-box {
  margin-top:14px; padding:12px; background:rgba(0,0,0,0.25);
  border-radius:8px; border:1px solid rgba(255,255,255,0.06);
}
#evidence-box h3 { font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:8px; font-weight:400; }
#evidence-text { font-size:13px; line-height:1.8; color:#b0bcd0; }
.ev-highlight { background:rgba(255,200,50,0.22); border-radius:2px; padding:0 2px; color:#ffe490; font-weight:500; }
.ev-pos { display:block; margin-top:6px; font-size:10px; color:rgba(255,255,255,0.3); }

#locate-btn {
  display:block; width:100%; margin-top:10px; padding:9px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
  border-radius:6px; color:#8cb4e8; font-size:12px; cursor:pointer;
  text-align:center; transition:all 0.2s;
}
#locate-btn:hover { background:rgba(255,255,255,0.12); color:#c8dcff; }

#connected-list { display:flex; flex-wrap:wrap; gap:5px; }
.conn-chip {
  padding:4px 10px; border-radius:14px; font-size:11px;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
  color:#b8c8e0; cursor:pointer; transition:all 0.2s; max-width:180px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.conn-chip:hover { background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.25); }

#tooltip {
  position:fixed; pointer-events:none; z-index:15;
  background:rgba(6,6,22,0.9); border:1px solid rgba(255,255,255,0.12);
  border-radius:6px; padding:7px 11px; font-size:12px; color:#d8e0f0;
  opacity:0; transition:opacity 0.12s; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}

#controls-hint {
  position:fixed; bottom:95px; left:50%; transform:translateX(-50%);
  z-index:10; color:rgba(255,255,255,0.25); font-size:10px;
  pointer-events:none; letter-spacing:1.5px;
}

@media (max-width:768px) {
  #sidebar { width:100vw; right:-100vw; }
  #sidebar-header h2 { max-width:200px; font-size:14px; }
  #legend { bottom:10px; gap:6px; padding:6px 10px; }
  #legend .legend-item { font-size:10px; gap:3px; }
  #title-bar { font-size:15px; top:10px; letter-spacing:4px; }
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="graph-container"></div>
<div id="loading">星球加载中...</div>
<div id="title-bar">文 本 知 识 星 球</div>

<div id="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#FF6B6B;"></span>人物</div>
  <div class="legend-item"><span class="legend-dot" style="background:#4ECDC4;"></span>动物</div>
  <div class="legend-item"><span class="legend-dot" style="background:#FFD93D;"></span>物体</div>
  <div class="legend-item"><span class="legend-dot" style="background:#6BCB77;"></span>地点</div>
  <div class="legend-item"><span class="legend-dot" style="background:#FF8C42;"></span>事件</div>
  <div class="legend-item"><span class="legend-dot" style="background:#C77DFF;"></span>情绪</div>
  <div class="legend-item"><span class="legend-dot" style="background:#48B5E4;"></span>概念</div>
</div>
<div id="controls-hint">拖拽旋转 · 滚轮缩放 · 点击节点探索 · 右键/Esc复位</div>

<div id="tooltip"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <h2 id="sidebar-title">节点详情</h2>
    <button id="sidebar-close" title="关闭 (Esc)">&times;</button>
  </div>
  <div id="sidebar-content">
    <div class="info-row"><div class="info-label">实体名称</div><div class="info-value" id="info-name">-</div></div>
    <div class="info-row"><div class="info-label">类别</div><div id="info-category">-</div></div>
    <div class="info-row"><div class="info-label">属性</div><div id="info-attrs"><span style="color:rgba(255,255,255,0.25);font-size:12px;">-</span></div></div>
    <div class="info-row"><div class="info-label">关联节点</div><div id="connected-list"></div></div>
    <div id="evidence-box"><h3>原文证据</h3><div id="evidence-text">点击节点以查看原文片段</div></div>
    <button id="locate-btn">在高亮页面中定位原文</button>
  </div>
</div>

<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
<script src="graph_data.js"></script>

<script>
var SPHERE_R = 220;
var GROUP_COLORS = {
  person:'#FF6B6B', animal:'#4ECDC4', object:'#FFD93D',
  place:'#6BCB77', event:'#FF8C42', emotion:'#C77DFF', concept:'#48B5E4'
};
var GROUP_NAMES = {
  person:'人物', animal:'动物', object:'物体', place:'地点',
  event:'事件', emotion:'情绪', concept:'概念'
};

var graph;
var SOURCE_TEXT = '';
var highlightNodes = new Set();
var highlightLinks = new Set();
var adjMap = new Map();
var loadingEl = document.getElementById('loading');

function esc(str) {
  if (!str) return '';
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function makeLinkKey(sid, tid) {
  return sid < tid ? sid + '|||' + tid : tid + '|||' + sid;
}

// Starfield
(function(){
  var cvs = document.getElementById('starfield');
  var ctx = cvs.getContext('2d');
  var W, H, stars = [];
  function resize() {
    W = cvs.width = window.innerWidth * 2;
    H = cvs.height = window.innerHeight * 2;
    cvs.style.width = window.innerWidth + 'px';
    cvs.style.height = window.innerHeight + 'px';
    stars = [];
    for (var i = 0; i < 500; i++) {
      stars.push({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.3+0.2,
        baseAlpha: Math.random()*0.5+0.15,
        speed: Math.random()*0.012+0.003,
        phase: Math.random()*Math.PI*2
      });
    }
  }
  function draw(t) {
    ctx.clearRect(0,0,W,H);
    for (var i=0;i<stars.length;i++) {
      var s=stars[i];
      var a=s.baseAlpha+Math.sin(t*s.speed+s.phase)*0.12;
      if(a<0.05)a=0.05;
      ctx.fillStyle='rgba(170,200,240,'+a.toFixed(3)+')';
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  resize();requestAnimationFrame(draw);
  window.addEventListener('resize',resize);
})();

function fibSphere(n, r) {
  var pts=[];
  var phi=Math.PI*(3-Math.sqrt(5));
  for(var i=0;i<n;i++){
    var y=1-(i/(n-1))*2;
    var ry=Math.sqrt(1-y*y);
    var th=phi*i;
    pts.push({x:Math.cos(th)*ry*r,y:y*r,z:Math.sin(th)*ry*r});
  }
  return pts;
}

function refreshVisuals(){
  graph.nodeColor(graph.nodeColor());
  graph.linkColor(graph.linkColor());
  graph.linkWidth(graph.linkWidth());
  graph.linkDirectionalParticleColor(graph.linkDirectionalParticleColor());
}

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  highlightNodes.clear();
  highlightLinks.clear();
  refreshVisuals();
}

function focusNodeById(id){
  var gd=graph.graphData();
  for(var i=0;i<gd.nodes.length;i++){
    if(gd.nodes[i].id===id){handleNodeClick(gd.nodes[i]);return;}
  }
}

function openSidebar(node, neighbors){
  document.getElementById('sidebar-title').textContent=node.id;
  document.getElementById('info-name').textContent=node.id;
  var gname=GROUP_NAMES[node.group]||node.group||'?';
  var color=node.color||GROUP_COLORS[node.group]||'#888';
  document.getElementById('info-category').innerHTML='<span class="info-badge" style="background:'+color+'">'+esc(gname)+'</span>';

  var attrs=node.attributes||{};
  var keys=Object.keys(attrs);
  var html='';var has=false;
  for(var i=0;i<keys.length;i++){
    var v=attrs[keys[i]];
    if(v!==null&&v!==''&&v!=='null'){
      has=true;
      var val=Array.isArray(v)?v.join(', '):String(v);
      html+='<div class="attr-row"><span class="attr-key">'+esc(keys[i])+'</span><span class="attr-val">'+esc(val)+'</span></div>';
    }
  }
  if(!has)html='<span style="color:rgba(255,255,255,0.25);font-size:12px;">无属性</span>';
  document.getElementById('info-attrs').innerHTML=html;

  var ch='';
  if(neighbors.length===0){
    ch='<span style="font-size:11px;color:rgba(255,255,255,0.3)">无直接关联</span>';
  }else{
    for(var j=0;j<neighbors.length;j++){
      var nb=neighbors[j];
      ch+='<span class="conn-chip" title="关系: '+esc(nb.relation)+'" data-nid="'+esc(nb.nodeId).replace(/"/g,'&quot;')+'">'+esc(nb.nodeId)+'</span>';
    }
  }
  document.getElementById('connected-list').innerHTML=ch;

  var ci=node.char_interval||{};
  var start=ci.start_pos,end=ci.end_pos;
  if(start!==undefined&&end!==undefined&&start<end&&SOURCE_TEXT){
    var before=SOURCE_TEXT.substring(Math.max(0,start-50),start);
    var exact=SOURCE_TEXT.substring(start,end);
    var after=SOURCE_TEXT.substring(end,Math.min(SOURCE_TEXT.length,end+50));
    document.getElementById('evidence-text').innerHTML=(before?esc(before):'')+'<span class="ev-highlight">'+esc(exact)+'</span>'+(after?esc(after):'')+'<span class="ev-pos">字符区间: ['+start+', '+end+']</span>';
  }else{
    document.getElementById('evidence-text').innerHTML='<span style="color:rgba(255,255,255,0.3)">此节点无原文位置信息</span>';
  }

  document.getElementById('locate-btn').onclick=function(){
    if(start!==undefined&&end!==undefined)window.open('highlight.html#pos='+start+'-'+end,'_blank');
  };

  document.getElementById('sidebar').classList.add('open');
}

function handleNodeClick(node){
  if(!node)return;
  var nid=node.id;
  var neighbors=adjMap.get(nid)||[];
  var nids=[];
  for(var i=0;i<neighbors.length;i++)nids.push(neighbors[i].nodeId);

  highlightNodes.clear();highlightLinks.clear();
  highlightNodes.add(nid);
  for(var i=0;i<nids.length;i++)highlightNodes.add(nids[i]);

  var gd=graph.graphData();
  for(var j=0;j<gd.links.length;j++){
    var l=gd.links[j];
    var sid=l.source.id||l.source;
    var tid=l.target.id||l.target;
    if((sid===nid&&nids.indexOf(tid)>=0)||(tid===nid&&nids.indexOf(sid)>=0)){
      highlightLinks.add(makeLinkKey(sid,tid));
    }
  }

  refreshVisuals();
  openSidebar(node,neighbors);

  var dist=350;
  graph.cameraPosition({x:node.x+dist*0.4,y:node.y+dist*0.2,z:node.z+dist*0.6},node,1000);
}

function handleNodeHover(node){
  var tip=document.getElementById('tooltip');
  if(node){
    var gn=GROUP_NAMES[node.group]||node.group||'';
    tip.innerHTML='<strong>'+esc(node.id)+'</strong> <span style="color:#888;font-size:10px">'+gn+'</span><br><span style="font-size:10px;color:#aaa">连接: '+(node.connections||0)+'</span>';
    tip.style.opacity='1';
  }else{tip.style.opacity='0';}
}

function handleBgClick(){
  closeSidebar();
  graph.cameraPosition({x:0,y:0,z:SPHERE_R*2.5},{x:0,y:0,z:0},1200);
}

document.getElementById('sidebar-close').addEventListener('click',closeSidebar);
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){if(document.getElementById('sidebar').classList.contains('open'))closeSidebar();handleBgClick();}
  if(e.key==='r'||e.key==='R'){e.preventDefault();handleBgClick();}
});

// Delegated click for connected chips (avoids inline onclick escaping hell)
document.getElementById('connected-list').addEventListener('click',function(e){
  var chip=e.target.closest('.conn-chip');
  if(chip){var nid=chip.getAttribute('data-nid');if(nid)focusNodeById(nid);}
});

// ═══════════════════════════════════════
// INIT — LOAD DATA FROM FILE (not embedded)
// ═══════════════════════════════════════
function initGraph(gData){
  var container=document.getElementById('graph-container');

  // Clone
  var nodes=[],links=[];
  for(var i=0;i<gData.nodes.length;i++){
    var n={};var on=gData.nodes[i];
    for(var k in on)n[k]=on[k];
    nodes.push(n);
  }
  for(var j=0;j<gData.links.length;j++){
    var l={};var ol=gData.links[j];
    for(var k in ol)l[k]=ol[k];
    links.push(l);
  }

  // Adjacency
  for(var i=0;i<nodes.length;i++)adjMap.set(nodes[i].id,[]);
  for(var j=0;j<links.length;j++){
    var lk=links[j];
    var sid=lk.source,tid=lk.target;
    if(adjMap.has(sid))adjMap.get(sid).push({nodeId:tid,relation:lk.relation});
    if(adjMap.has(tid))adjMap.get(tid).push({nodeId:sid,relation:lk.relation});
  }

  // Sphere positions
  var pos=fibSphere(nodes.length,SPHERE_R);
  for(var i=0;i<nodes.length;i++){
    nodes[i].fx=pos[i].x;nodes[i].fy=pos[i].y;nodes[i].fz=pos[i].z;
  }

  try{
    graph=ForceGraph3D()(container)
      .graphData({nodes:nodes,links:links})
      .backgroundColor('rgba(0,0,0,0)')
      .nodeColor(function(n){
        if(highlightNodes.size===0)return n.color||GROUP_COLORS[n.group]||'#888';
        return highlightNodes.has(n.id)?(n.color||GROUP_COLORS[n.group]||'#888'):'rgba(35,35,50,0.3)';
      })
      .nodeVal(function(n){return n.size||3;})
      .nodeLabel(function(n){return n.id+' ['+(GROUP_NAMES[n.group]||n.group)+'] cnx:'+(n.connections||0);})
      .nodeResolution(32)
      .linkColor(function(l){
        if(highlightLinks.size===0)return'rgba(80,130,200,0.22)';
        var key=makeLinkKey(l.source.id||l.source,l.target.id||l.target);
        return highlightLinks.has(key)?'rgba(255,210,80,0.4)':'rgba(20,20,35,0.06)';
      })
      .linkWidth(function(l){
        if(highlightLinks.size===0)return 0.6;
        var key=makeLinkKey(l.source.id||l.source,l.target.id||l.target);
        return highlightLinks.has(key)?2.0:0.2;
      })
      .linkDirectionalParticles(2)
      .linkDirectionalParticleSpeed(0.0035)
      .linkDirectionalParticleWidth(1.2)
      .linkDirectionalParticleColor(function(l){
        if(highlightLinks.size===0)return'rgba(100,160,240,0.4)';
        var key=makeLinkKey(l.source.id||l.source,l.target.id||l.target);
        return highlightLinks.has(key)?'rgba(255,220,80,0.9)':'rgba(60,80,120,0.08)';
      })
      .onNodeClick(handleNodeClick)
      .onNodeHover(handleNodeHover)
      .onBackgroundClick(handleBgClick)
      .onNodeRightClick(handleBgClick)
      .enableNodeDrag(false)
      .showNavInfo(false)
      .width(container.clientWidth)
      .height(container.clientHeight);

    var ctrl=graph.controls();
    ctrl.enableDamping=true;ctrl.dampingFactor=0.08;
    ctrl.rotateSpeed=0.35;ctrl.zoomSpeed=1.2;
    ctrl.minDistance=60;ctrl.maxDistance=1000;

    window.addEventListener('resize',function(){
      graph.width(container.clientWidth);
      graph.height(container.clientHeight);
    });

    loadingEl.style.opacity='0';
    setTimeout(function(){loadingEl.style.display='none';},500);
  }catch(e){
    loadingEl.textContent='Init Error: '+e.message;
    loadingEl.style.color='#f66';
  }
}

// ═══════════════════════════════════════
// LOAD DATA & START
// ═══════════════════════════════════════
if(typeof THREE==='undefined'){
  loadingEl.textContent='Error: THREE.js not loaded';
  loadingEl.style.color='#f66';
}else if(typeof ForceGraph3D==='undefined'){
  loadingEl.textContent='Error: 3d-force-graph not loaded';
  loadingEl.style.color='#f66';
}else if(typeof FULL_GRAPH==='undefined'){
  loadingEl.textContent='Error: graph_data.js not loaded';
  loadingEl.style.color='#f66';
}else{
  SOURCE_TEXT=(FULL_GRAPH.metadata&&FULL_GRAPH.metadata.source_text)||'';
  loadingEl.textContent='Initializing 3D graph...';
  setTimeout(function(){initGraph(FULL_GRAPH);},50);
}
</script>
</body>
</html>
